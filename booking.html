<section class="booking">

<div class="booking-box">

<h1>Book Your Stay</h1>

<p>
Reserve your dream room in just a few clicks.
</p>

<form>

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email Address"
required>

<input type="tel"
placeholder="Phone Number"
required>

<select required>

<option value="">
Select Room
</option>

<option>
Deluxe Room
</option>

<option>
Premium Room
</option>

<option>
Luxury Suite
</option>

</select>

<label>Check-In</label>

<input type="date"
required>

<label>Check-Out</label>

<input type="date"
required>

<input type="number"
placeholder="Number of Guests"
required>

<textarea
placeholder="Special Requests"
rows="4">
</textarea>

<button>

Book Now

</button>

</form>

</div>

</section>

<footer>

<p>

© 2026 Hotel Paradise | Luxury Redefined

</p>

</footer>
<script type="module" src="js/booking.js"></script>
</body>

</html>
